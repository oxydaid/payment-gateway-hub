services:
  # PHP FPM Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pg-bridge-app:latest
    restart: unless-stopped
    volumes:
      - app_data:/var/www
    env_file:
      - .env
    depends_on:
      - db
      - redis

  # Nginx Web Server
  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    volumes:
      - app_data:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  # Database Server
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-pg_bridge}
      MYSQL_USER: ${DB_USERNAME:-sail}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"

  # Redis Cache & Queue
  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"

  # Queue Worker
  queue-worker:
    image: pg-bridge-app:latest
    restart: unless-stopped
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    volumes:
      - app_data:/var/www
    env_file:
      - .env
    depends_on:
      - app
      - redis

  # Cron Task Scheduler
  scheduler:
    image: pg-bridge-app:latest
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run --no-interaction & sleep 60; done"
    volumes:
      - app_data:/var/www
    env_file:
      - .env
    depends_on:
      - app

volumes:
  app_data:
  db_data:
  redis_data:

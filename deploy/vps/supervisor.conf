[program:pg-bridge-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/pg-bridge/artisan queue:work --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=3
redirect_stderr=true
stdout_logfile=/var/www/pg-bridge/storage/logs/worker.log
stopwaitsecs=3600

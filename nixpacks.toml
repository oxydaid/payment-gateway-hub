# Nixpacks configuration for Laravel + Inertia Vue (pnpm)
[providers]
php = {}
node = {}

[phases.setup]
aptPkgs = [
    "libpng-dev",
    "libjpeg-dev",
    "libwebp-dev",
    "zip",
    "unzip",
    "git"
]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm install -g pnpm",
    "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
    "pnpm build",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]
